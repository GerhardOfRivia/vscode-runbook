name: Runbook Extension Build & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Get Extension Version
        run: |
          echo "SEMVER=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Bundle Extension
        run: npm run bundle

      - name: Package VSIX
        run: npm run vsce-package

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-runbook-${{ env.SEMVER }}
          path: "*.vsix"

      - name: Create or Update Latest Release
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest \
              --title "Latest Build" \
              --notes "Latest automated build"

          gh release upload latest *.vsix --clobber

      - name: Create Versioned Release
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${SEMVER}" >/dev/null 2>&1; then
            gh release upload "${SEMVER}" *.vsix --clobber
          else
            gh release create "${SEMVER}" *.vsix \
              --title "Runbook ${SEMVER}" \
              --notes "Automated release for version ${SEMVER}"
          fi